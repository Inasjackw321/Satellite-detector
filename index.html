<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#05080d" />
  <meta name="description" content="WAVE2MAP — a feed of Sentinel-2 satellite scenes of disaster locations (NASA EONET) and showcase targets, each annotated with acquisition metadata." />
  <title>WAVE2MAP · Sentinel-2 Scene Feed</title>

  <link
    rel="stylesheet"
    href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
    integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
    crossorigin=""
  />
  <link rel="preconnect" href="https://eonet.gsfc.nasa.gov" />
  <link rel="preconnect" href="https://tiles.maps.eox.at" />
  <link rel="preconnect" href="https://basemaps.cartocdn.com" />
  <link rel="stylesheet" href="assets/css/styles.css" />
</head>
<body>
  <!-- boot -->
  <div id="boot" class="boot">
    <div class="boot__inner">
      <div class="boot__logo"><span class="wm-dot"></span> WAVE2MAP</div>
      <div class="boot__bar"><span id="boot-fill" class="boot__fill"></span></div>
      <div id="boot-status" class="boot__status">Establishing downlink…</div>
    </div>
  </div>

  <!-- header -->
  <header class="hdr">
    <div class="hdr__brand"><span class="wm-dot"></span> WAVE2MAP</div>

    <div class="hdr__controls">
      <div class="seg" role="tablist" aria-label="Scene source">
        <button class="seg__btn is-on" data-mode="live" role="tab">● LIVE DISASTERS</button>
        <button class="seg__btn" data-mode="showcase" role="tab">SHOWCASE</button>
        <button class="seg__btn" data-mode="archive" role="tab" title="Imagery downloaded by the GitHub Action">ARCHIVE</button>
      </div>
      <div class="pill" id="status"><span class="pill__dot"></span><span id="status-label">DOWNLINK</span></div>
      <span class="mono" id="count">0 scenes</span>
      <button class="btn" id="refresh" title="Reload feed">⟳</button>
      <span class="mono hdr__clock" id="clock">--:--:-- UTC</span>
    </div>
  </header>

  <div id="banner" class="banner" hidden></div>

  <!-- the feed: a list of Sentinel-2 scene cards -->
  <main id="feed" class="feed"></main>

  <div class="feed__more">
    <button id="load-more" class="btn btn--wide" hidden>LOAD MORE SCENES</button>
  </div>

  <footer class="foot">
    <span>Imagery: <a href="https://s2maps.eu" target="_blank" rel="noopener">Sentinel-2 cloudless</a> (ESA Copernicus / EOX)</span>
    <span>Events: <a href="https://eonet.gsfc.nasa.gov/" target="_blank" rel="noopener">NASA EONET</a></span>
    <span>Locator: © OpenStreetMap · CARTO</span>
  </footer>

  <script
    src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
    integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
    crossorigin=""
  ></script>
  <script type="module" src="assets/js/app.js"></script>
</body>
</html>
