name: Fetch Sentinel-2 Imagery

# Downloads fresh Sentinel-2 imagery for current NASA EONET disaster locations
# and commits it to the repo (data/scenes/* + data/scenes.json). Run it manually
# from the Actions tab, or let the daily schedule refresh it.
on:
  workflow_dispatch:
    inputs:
      limit:
        description: "Number of locations to image"
        default: "12"
        required: false
      days:
        description: "EONET look-back window (days)"
        default: "30"
        required: false
      width:
        description: "Image width (px)"
        default: "1024"
        required: false
      height:
        description: "Image height (px)"
        default: "768"
        required: false
  schedule:
    - cron: "0 6 * * *" # daily at 06:00 UTC

permissions:
  contents: write

concurrency:
  group: fetch-imagery
  cancel-in-progress: false

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies (sharp)
        run: npm install --no-audit --no-fund

      - name: Download Sentinel-2 imagery (NASA EONET locations)
        env:
          LIMIT: ${{ github.event.inputs.limit || '12' }}
          DAYS: ${{ github.event.inputs.days || '30' }}
          WIDTH: ${{ github.event.inputs.width || '1024' }}
          HEIGHT: ${{ github.event.inputs.height || '768' }}
          # Optional: set these repo secrets to fetch fresh Sentinel-2 L2A
          # instead of the key-less cloudless mosaic.
          SH_CLIENT_ID: ${{ secrets.SH_CLIENT_ID }}
          SH_CLIENT_SECRET: ${{ secrets.SH_CLIENT_SECRET }}
        run: node scripts/fetch-imagery.mjs

      - name: Commit & push imagery
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/
          if git diff --cached --quiet; then
            echo "No imagery changes to commit."
          else
            git commit -m "chore: refresh Sentinel-2 imagery (NASA EONET locations)"
            git push origin HEAD:${{ github.ref_name }}
          fi
